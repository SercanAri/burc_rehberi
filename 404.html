<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadi | Astro</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, Arial, sans-serif;
      color: #fff8f1;
      background:
        radial-gradient(circle at top left, rgba(255, 184, 107, 0.18), transparent 28rem),
        radial-gradient(circle at 80% 8%, rgba(167, 139, 250, 0.18), transparent 24rem),
        #12091f;
    }

    main {
      width: min(680px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      padding: 28px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: -0.06em;
    }

    p {
      margin: 0 0 14px;
      color: #c9bdda;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 12px 18px;
      color: inherit;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
    }

    .primary {
      color: #241128;
      background: linear-gradient(135deg, #ffb86b, #ff7a90);
      border-color: rgba(255, 184, 107, 0.42);
      font-weight: 800;
    }
  </style>
  <script>
    (function () {
      var pathname = window.location.pathname;
      var search = window.location.search || "";
      var hash = window.location.hash || "";
      var repoBaseMatch = pathname.match(/^(.*\/burc_rehberi)(?:\/.*)?$/);
      var repoBase = repoBaseMatch ? repoBaseMatch[1] : "";
      var legacyPrefix = "/burc-tanitim-sitesi/";
      var redirects = {
        "/burc-tanitim-sitesi": "/index.html",
        "/burc-tanitim-sitesi/": "/index.html",
        "/burc-tanitim-sitesi/index.html": "/index.html",
        "/burc-tanitim-sitesi/yildiz-haritasi.html": "/yildiz-haritasi.html",
        "/burc-tanitim-sitesi/burc.html": "/burc.html"
      };
      var repoRelativePath = repoBase ? pathname.slice(repoBase.length) || "/" : pathname;
      var targetPath = redirects[repoRelativePath];

      if (targetPath) {
        window.location.replace((repoBase || "") + targetPath + search + hash);
      }
    }());
  </script>
</head>
<body>
  <main>
    <p>Astro</p>
    <h1>Bu sayfayi bulamadik.</h1>
    <p>Eski bir linke gelmis olabilirsin. Ana sayfa ve arac sayfalari calisiyor; asagidaki butonlarla dogru adrese gecebilirsin.</p>
    <div class="actions">
      <a class="primary" href="./index.html">Ana Sayfa</a>
      <a href="./yildiz-haritasi.html">Yildiz Haritasi</a>
    </div>
  </main>
</body>
</html>
